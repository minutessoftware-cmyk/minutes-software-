<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minutes — Track Your Job</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f7f4;--bg2:#ffffff;--bg3:#f2f2ef;--bg4:#eaeae6;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.11);--text:#1a1a18;--text2:#6b6b66;--text3:#a8a8a4;--accent:#F58220;--accent2:#dd6f12;--adim:rgba(245,130,32,0.1);--danger:#f04f4a;--ddim:rgba(240,79,74,0.1);--warn:#f0a830;--wdim:rgba(240,168,48,0.1);--info:#4d9ef5;--idim:rgba(77,158,245,0.1);--success:#3dd68c;--sdim:rgba(61,214,140,0.1);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:8px;--rl:12px;--rxl:16px;--mshadow:0 20px 60px rgba(0,0,0,0.12)}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow-x:hidden}
.dots{position:fixed;inset:0;background-image:radial-gradient(circle,var(--border2) 1px,transparent 1px);background-size:32px 32px;opacity:.5;z-index:0}
.box{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:2.25rem;width:100%;max-width:460px;box-shadow:var(--mshadow)}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.logo-name{font-size:24px;font-weight:700;letter-spacing:-1px;color:var(--accent);text-transform:lowercase}
.badge{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--accent);background:var(--adim);padding:3px 8px;border-radius:4px;border:1px solid rgba(245,130,32,.2)}
.sub{font-size:13px;color:var(--text2);margin:8px 0 1.75rem}
.fg{display:flex;flex-direction:column;gap:5px;margin-top:12px}
.fg:first-of-type{margin-top:0}
.fg label{font-size:12px;font-weight:500;color:var(--text2)}
.req{color:var(--danger)}
.fg input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:11px 12px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,130,32,.1)}
input::placeholder{color:var(--text3);opacity:1}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:11px;color:var(--text3)}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);border:none;transition:all .15s;width:100%}
.b-accent{background:var(--accent);color:#fff}.b-accent:hover{background:var(--accent2)}
.b-ghost{background:none;border:1px solid var(--border2);color:var(--text2);width:auto;padding:8px 16px;font-size:13px}.b-ghost:hover{background:var(--bg3)}
.err-box{color:var(--danger);font-size:12px;background:var(--ddim);border:1px solid rgba(240,79,74,.2);padding:10px 12px;border-radius:var(--r);margin-top:10px}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--text3);font-size:13px;gap:10px}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.cp{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--adim);color:var(--accent)}
.result{margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1.5rem}
.r-head{text-align:center;margin-bottom:1.25rem}
.r-name{font-size:20px;font-weight:600;margin-bottom:6px}
.r-item{font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.confirm{display:flex;gap:8px;justify-content:center;margin:1.25rem 0}
.confirm .btn{width:auto;padding:9px 16px;font-size:13px}
.wtag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;background:var(--wdim);color:var(--warn);margin-top:10px}
.wtag.exp{background:var(--ddim);color:var(--danger)}
.tp{display:flex;flex-direction:column;margin-top:1rem}
.tp-step{display:flex;gap:14px;position:relative}
.tp-line{position:absolute;left:15px;top:32px;bottom:-2px;width:2px;background:var(--border2)}
.tp-step:last-child .tp-line{display:none}
.tp-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;z-index:1;border:2px solid transparent}
.tp-done{background:var(--success);color:#fff;border-color:var(--success)}
.tp-active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tp-pending{background:var(--bg3);color:var(--text3);border-color:var(--border2)}
.tp-body{padding:5px 0 24px}
.tp-label{font-size:14px;font-weight:500}
.tp-sub{font-size:12px;color:var(--text3);margin-top:2px}
.ti-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.ti-cell{background:var(--bg3);border-radius:var(--r);padding:11px 13px;border:1px solid var(--border)}
.ti-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.ti-val{font-size:13px;font-weight:500}
.foot{text-align:center;font-size:11px;color:var(--text3);margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.again{text-align:center;margin-top:1rem}
</style>
</head>
<body>
<div class="dots"></div>
<div class="box">
  <div class="logo"><div class="logo-name">minutes</div><span class="badge">TRACK</span></div>
  <div class="sub">Enter your details to track your repair or service job.</div>

  <div id="search-form">
    <div class="fg"><label>Receipt / Job ID</label><input type="text" id="ct-id" placeholder="e.g. MIN-A1B2C3"/></div>
    <div class="or-div">or</div>
    <div class="fg"><label>Last name <span class="req">*</span></label><input type="text" id="ct-lastname" placeholder="e.g. Al-Dosari"/></div>
    <div class="fg"><label>Phone number <span class="req">*</span></label><input type="tel" id="ct-phone" placeholder="+971 50 123 4567"/></div>
    <div id="ct-err" style="display:none"></div>
    <button class="btn b-accent" style="margin-top:18px" onclick="doTrack()">Find my job &rarr;</button>
  </div>
  <div id="result"></div>
</div>

<script>
const SUPABASE_URL='https://cmcrioowbpnqhezmluwm.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtY3Jpb293YnBucWhlem1sdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDcyNjcsImV4cCI6MjA5NTI4MzI2N30.cgoF7WW3hrRnCXValzw2F94qXM0bnCjmh365i-DDCRc';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON);
const CE={Phone:'Phone',Watch:'Watch','Shoes & Bags':'Shoes & Bags',Laptop:'Laptop','Gaming Console':'Gaming','Key Cutting':'Key Cutting',Engraving:'Engraving',Printing:'Printing',Alteration:'Alteration',Other:'Other'};

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-AE',{day:'numeric',month:'short',year:'numeric'});}
function wInfo(j){if(j.status!=='delivered')return null;const exp=new Date(new Date(j.created_at).getTime()+7*864e5);const days=Math.ceil((exp-new Date())/864e5);if(days<0)return{text:'Warranty expired',exp:true};if(days===0)return{text:'Warranty expires today',exp:false};return{text:`Warranty: ${days} day${days!==1?'s':''} left`,exp:false};}

async function doTrack(){
  const jobId=document.getElementById('ct-id').value.trim().toUpperCase();
  const lastName=document.getElementById('ct-lastname').value.trim().toLowerCase();
  const phone=document.getElementById('ct-phone').value.trim();
  const errEl=document.getElementById('ct-err');
  errEl.style.display='none';
  document.getElementById('result').innerHTML='';
  if(!lastName&&!jobId){errEl.className='err-box';errEl.textContent='Please enter your last name and phone number, or your job ID.';errEl.style.display='block';return;}
  if(lastName&&!phone){errEl.className='err-box';errEl.textContent='Please enter your phone number along with your last name.';errEl.style.display='block';return;}
  document.getElementById('result').innerHTML='<div class="loading"><div class="spin"></div>Looking up your job...</div>';
  if(jobId){
    const{data,error}=await db.from('jobs').select('*').eq('job_id',jobId).single();
    if(error||!data){document.getElementById('result').innerHTML='';errEl.className='err-box';errEl.textContent='No job found with that ID. Please check and try again.';errEl.style.display='block';return;}
    renderResult(data);return;
  }
  const cleanPhone=phone.replace(/[\s\-\+\(\)]/g,'');
  const{data:all}=await db.from('jobs').select('*').order('created_at',{ascending:false});
  const matched=(all||[]).filter(j=>{const jp=(j.customer_phone||'').replace(/[\s\-\+\(\)]/g,'');const pm=jp.endsWith(cleanPhone.slice(-8))||cleanPhone.endsWith(jp.slice(-8));const lm=(j.customer_name||'').toLowerCase().split(/\s+/).some(w=>w.includes(lastName)||lastName.includes(w));return pm&&lm;});
  if(!matched.length){document.getElementById('result').innerHTML='';errEl.className='err-box';errEl.textContent='No job found. Please check your details or contact your branch.';errEl.style.display='block';return;}
  renderResult(matched[0]);
}

function renderResult(j){
  let sts;
  if(j.delivery_method==='pickup_delivery')sts=['booked','picked_up','received','in_progress','ready','out_for_delivery','delivered'];
  else if(j.origin==='online')sts=['booked','received','in_progress','ready','delivered'];
  else sts=['received','in_progress','ready','delivered'];
  const stl={booked:'Booked',picked_up:'Picked Up',received:'Job Received',in_progress:'In Progress',ready:'Ready for Collection',out_for_delivery:'Out for Delivery',delivered:'Collected'};
  const sts2={booked:'Your booking is confirmed. We will arrange collection.',picked_up:'We have collected your item.',received:'We have your item and will begin shortly.',in_progress:'Our technician is working on it right now.',ready:'Your item is ready.',out_for_delivery:'Your item is on its way back to you.',delivered:'All done. Thank you for choosing Minutes!'};
  const ci=sts.indexOf(j.status);
  const wi=wInfo(j);
  document.getElementById('search-form').style.display='none';
  document.getElementById('result').innerHTML=`
    <div class="result">
      <div class="r-head">
        <div class="r-name">${esc(j.customer_name)}</div>
        <div class="r-item"><span class="cp">${esc(j.category)}</span>${esc(j.item)}</div>
        ${wi?`<div><span class="wtag ${wi.exp?'exp':''}">${wi.text}</span></div>`:''}
      </div>
      <div class="confirm">
        <button class="btn b-accent" onclick="confMe(true)">Yes, this is me</button>
        <button class="btn b-ghost" onclick="confMe(false)">Not me</button>
      </div>
      <div id="detail" style="display:none">
        <div class="ti-grid">
          <div class="ti-cell"><div class="ti-lbl">Service</div><div class="ti-val">${esc(j.service)}</div></div>
          <div class="ti-cell"><div class="ti-lbl">Branch</div><div class="ti-val">${esc(j.branch)}</div></div>
          <div class="ti-cell"><div class="ti-lbl">Estimated cost</div><div class="ti-val" style="color:var(--accent)">AED ${(j.estimated_cost||0).toFixed(2)}</div></div>
          <div class="ti-cell"><div class="ti-lbl">Ready date</div><div class="ti-val">${j.ready_date?fd(j.ready_date):'—'}</div></div>
        </div>
        <div class="tp">
          ${sts.map((s,i)=>{const done=i<ci,active=i===ci;return`<div class="tp-step"><div class="tp-line"></div><div class="tp-dot ${done?'tp-done':active?'tp-active':'tp-pending'}">${done?'\u2713':i+1}</div><div class="tp-body"><div class="tp-label" style="color:${active?'var(--accent)':done?'var(--success)':'var(--text3)'}">${stl[s]}</div><div class="tp-sub">${active||done?sts2[s]:''}</div></div></div>`;}).join('')}
        </div>
        <div class="foot">Questions? Call Minutes: 800-MINUTES</div>
        <div class="again"><button class="btn b-ghost" onclick="resetTrack()">Track another job</button></div>
      </div>
    </div>`;
}

function confMe(yes){
  document.querySelectorAll('.confirm .btn').forEach(b=>b.style.display='none');
  if(yes){document.getElementById('detail').style.display='block';}
  else{resetTrack();const e=document.getElementById('ct-err');e.className='err-box';e.textContent='Maybe you entered the wrong details — please try again.';e.style.display='block';}
}

function resetTrack(){
  document.getElementById('result').innerHTML='';
  document.getElementById('search-form').style.display='block';
  ['ct-id','ct-lastname','ct-phone'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
</script>
</body>
</html>
